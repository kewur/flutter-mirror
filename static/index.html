<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Android Mirror</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #111;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }
        .screen-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #screen {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 12px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            min-height: 48px;
            flex-shrink: 0;
        }
        .nav-btn {
            background: none;
            border: 1px solid #444;
            color: #ccc;
            font-size: 20px;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 8px;
        }
        .nav-btn:active { background: #444; color: #fff; }
        .status {
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-family: system-ui, sans-serif;
            color: #fff;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .status.connected { background: rgba(40,120,40,0.8); }
        .status.disconnected { background: rgba(120,40,40,0.8); pointer-events: auto; cursor: pointer; }
        .status.connecting { background: rgba(120,120,40,0.8); }
        .fps {
            position: fixed;
            top: 8px;
            left: 8px;
            color: #555;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .text-input-bar {
            display: none;
            padding: 6px 12px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        .text-input-bar.visible { display: flex; gap: 8px; }
        .text-input-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .text-input-bar button {
            padding: 8px 16px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #333;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status connecting" id="status">Connecting...</div>
        <div class="fps" id="fps"></div>

        <div class="screen-area">
            <canvas id="screen"></canvas>
        </div>

        <div class="text-input-bar" id="textBar">
            <input type="text" id="textInput" placeholder="Type text..." autocomplete="off" autocapitalize="off">
            <button id="textSend">Send</button>
            <button id="textClose">X</button>
        </div>

        <div class="nav-bar">
            <button class="nav-btn" id="btnBack">&#9665;</button>
            <button class="nav-btn" id="btnHome">&#9675;</button>
            <button class="nav-btn" id="btnSend" style="color:#4af;border-color:#4af">&#9654;</button>
            <button class="nav-btn" id="btnRecents">&#9633;</button>
            <button class="nav-btn" id="btnKeyboard">&#9000;</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const fpsEl = document.getElementById('fps');
const textBar = document.getElementById('textBar');
const textInput = document.getElementById('textInput');

let ws = null;
let reconnectTimer = null;
let frameCount = 0;
let lastFpsTime = Date.now();

// Gesture recording — touches are buffered and sent after idle
let gestureBuffer = [];
let flushTimer = null;
const FLUSH_DELAY = 1500;

function recordEvent(type, touch) {
    const pos = getPos(touch);
    gestureBuffer.push({ type, x: pos.x, y: pos.y, t: Date.now() });
    fpsEl.textContent = gestureBuffer.length + ' buffered';
    if (flushTimer) clearTimeout(flushTimer);
    if (type === 'up') {
        flushTimer = setTimeout(flushGestures, FLUSH_DELAY);
    }
    drawGesturePreview();
}

function flushGestures() {
    if (gestureBuffer.length === 0) return;
    const t0 = gestureBuffer[0].t;
    const events = gestureBuffer.map(e => ({ ...e, t: e.t - t0 }));
    send({ action: 'replay', events });
    statusEl.textContent = 'Sent ' + events.length + ' events';
    statusEl.className = 'status connected';
    statusEl.style.opacity = '1';
    setTimeout(() => { statusEl.style.opacity = '0'; }, 1500);
    gestureBuffer = [];
    flushTimer = null;
    drawGesturePreview();
}

function drawGesturePreview() {
    if (gestureBuffer.length === 0) return;
    const sx = canvas.width;
    const sy = canvas.height;
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.7)';
    ctx.fillStyle = 'rgba(0, 180, 255, 0.5)';
    ctx.lineWidth = 3;

    let drawing = false;
    for (const e of gestureBuffer) {
        const px = e.x * sx;
        const py = e.y * sy;
        if (e.type === 'down') {
            if (drawing) ctx.stroke();
            ctx.beginPath();
            ctx.arc(px, py, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px, py);
            drawing = true;
        } else if (e.type === 'move' && drawing) {
            ctx.lineTo(px, py);
        } else if (e.type === 'up') {
            if (drawing) {
                ctx.lineTo(px, py);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fill();
            drawing = false;
        }
    }
    if (drawing) ctx.stroke();
    ctx.restore();
}

function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.binaryType = 'blob';

    ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'status connected';
        setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
    };

    ws.onclose = () => {
        statusEl.textContent = 'Disconnected — tap to reconnect';
        statusEl.className = 'status disconnected';
        statusEl.style.opacity = '1';
        reconnectTimer = setTimeout(connect, 5000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
        if (!(e.data instanceof Blob)) return;
        const img = new Image();
        img.onload = () => {
            if (canvas.width !== img.width || canvas.height !== img.height) {
                canvas.width = img.width;
                canvas.height = img.height;
            }
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(img.src);
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = frameCount + ' fps';
                frameCount = 0;
                lastFpsTime = now;
            }
        };
        img.src = URL.createObjectURL(e.data);
    };
}

function send(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(data));
    }
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
        y: Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height))
    };
}

// Touch events
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    recordEvent('down', e.touches[0]);
});
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    recordEvent('move', e.touches[0]);
});
canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    recordEvent('up', e.changedTouches[0]);
});

// Mouse (desktop testing)
let mouseDown = false;
canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    recordEvent('down', e);
});
canvas.addEventListener('mousemove', (e) => {
    if (mouseDown) recordEvent('move', e);
});
canvas.addEventListener('mouseup', (e) => {
    mouseDown = false;
    recordEvent('up', e);
});

// Nav buttons
document.getElementById('btnBack').onclick = () => send({ action: 'key', keycode: 4 });
document.getElementById('btnHome').onclick = () => send({ action: 'key', keycode: 3 });
document.getElementById('btnSend').onclick = () => flushGestures();
document.getElementById('btnRecents').onclick = () => send({ action: 'key', keycode: 187 });
document.getElementById('btnKeyboard').onclick = () => {
    textBar.classList.toggle('visible');
    if (textBar.classList.contains('visible')) textInput.focus();
};

// Text input
document.getElementById('textSend').onclick = () => {
    if (textInput.value) {
        send({ action: 'text', text: textInput.value });
        textInput.value = '';
    }
};
textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (textInput.value) {
            send({ action: 'text', text: textInput.value });
            textInput.value = '';
        }
        send({ action: 'key', keycode: 66 });
    } else if (e.key === 'Backspace' && !textInput.value) {
        send({ action: 'key', keycode: 67 });
    }
});
document.getElementById('textClose').onclick = () => textBar.classList.remove('visible');

statusEl.addEventListener('click', () => {
    if (statusEl.className.includes('disconnected')) {
        if (reconnectTimer) clearTimeout(reconnectTimer);
        connect();
    }
});

connect();
</script>
</body>
</html>
